  function loadCities() {
    const state = document.getElementById("stateSelect").value;
    const citySelect = document.getElementById("citySelect");
    citySelect.innerHTML = "<option value=''>--Select City--</option>";
    if(data[state]) {
      Object.keys(data[state]).forEach(city => {
        const opt = document.createElement("option");
        opt.value = city; opt.textContent = city;
        citySelect.appendChild(opt);
      });
    }
  }

  function showNumber() {
    const state = document.getElementById("stateSelect").value;
    const city = document.getElementById("citySelect").value;
    const info = data[state]?.[city];
    const booking = document.getElementById("bookingNumber");
    const pharmacyList = document.getElementById("pharmacyList");
    pharmacyList.innerHTML = "";
    if(info) {
      booking.textContent = "Booking Number: " + info.number;
      info.pharmacies.forEach(ph => {
        const li = document.createElement("li");
        li.textContent = ph;
        pharmacyList.appendChild(li);
      });
    } else {
      booking.textContent = "";
    }
  }

  function openWhatsApp() {
    const state = document.getElementById("stateSelect").value;
    const city = document.getElementById("citySelect").value;
    const info = data[state]?.[city];
    if(info) {
      const url = "https://wa.me/91" + info.number + "?text=Hello, I want to book an appointment.";
      window.open(url, "_blank");
    } else {
      alert("Please select state and city first.");
    }
